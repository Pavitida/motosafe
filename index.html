<header>
    <h1>MOTOSAFE</h1>
</header>

<div id="popup"></div>

<div class="card interactive">
    <div class="button-group">
        <button class="start" onclick="startRide()">START</button>
        <button class="stop" onclick="stopRide()">STOP</button>
        <button class="export" onclick="exportCSV()">EXPORT</button>
        <button class="clear" onclick="clearData()">CLEAR</button>
    </div>
</div>

<div class="card interactive">
    <div class="hero-container">
        <div class="speed-unit">SPEEDOMETER</div>
        <span id="speed">0.0</span>
        <div class="speed-unit">KM/H</div>
    </div>
    <hr style="border: 0; border-top: 1px solid rgba(255,255,255,0.05); margin: 15px 0;">
    <div class="stats-grid stats-center">
        <div class="stat-item" style="text-align: center;">
            <div class="risk-label">PEAK DECEL</div>
            <div id="peak" class="stat-value">0</div>
        </div>
        <div class="stat-item" style="text-align: center;">
            <div class="risk-label">RISK LEVEL</div>
            <div id="risk" class="stat-value">100</div>
        </div>
    </div>
    <div style="text-align: center; margin-top: 15px;">
        <span class="speed-unit">RIDING STYLE:</span> 
        <b id="style" style="color: #c2e4ff; letter-spacing: 2px;">SAFE</b>
    </div>
</div>

<div class="card interactive">
    <div class="stats-grid" style="text-align: center; font-size: 13px;">
        <div>Total Brakes: <span id="total">0</span></div>
        <div>Hard Brakes: <span id="hard">0</span></div>
        <div>Brake Dist: <span id="brakeDist">0</span> km</div>
        <div>Avg Decel: <span id="avg">0</span></div>
    </div>
    <div style="margin-top: 12px; opacity: 0.6; text-align: center; font-size: 12px;">
        Max Decel: <span id="max">0</span>
    </div>
</div>

<div class="card interactive"><canvas id="speedChart"></canvas></div>
<div class="card interactive"><canvas id="decelChart"></canvas></div>
<div class="card interactive"><div id="map" style="height: 300px;"></div></div>
