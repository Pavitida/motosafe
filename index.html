<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MotoSafe Pro</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>
body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
color:white;
text-align:center;
}

.container{
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
padding:20px;
max-width:900px;
margin:auto;
}

.card{
background:rgba(255,255,255,0.1);
padding:20px;
border-radius:20px;
}

.value{
font-size:30px;
}

button{
padding:12px 25px;
margin:10px;
border:none;
border-radius:12px;
background:#4f8cff;
color:white;
font-size:16px;
}

canvas{
background:white;
margin:20px;
border-radius:20px;
}

#map{
height:300px;
margin:20px;
border-radius:20px;
}
</style>
</head>

<body>

<h1>🏍️ MotoSafe Pro</h1>

<div class="container">

<div class="card">
<h3>Speed</h3>
<div id="speed" class="value">0</div>
</div>

<div class="card">
<h3>Max Speed</h3>
<div id="maxSpeed" class="value">0</div>
</div>

<div class="card">
<h3>Distance (km)</h3>
<div id="distanceRide" class="value">0</div>
</div>

<div class="card">
<h3>Duration (s)</h3>
<div id="duration" class="value">0</div>
</div>

</div>

<div>
<button onclick="startRide()">Start</button>
<button onclick="stopRide()">Stop</button><br>
<button onclick="exportCSV()">Export CSV</button>
<button onclick="clearData()">Clear</button>
</div>

<canvas id="speedChart"></canvas>

<div id="map"></div>

<script src="script.js"></script>

</body>
</html>
