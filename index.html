<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MotoSafe Pro</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.heat/dist/leaflet-heat.js"></script>

<style>
body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
color:white;
text-align:center;
}

.container{
display:grid;
grid-template-columns:1fr 1fr;
gap:15px;
padding:20px;
}

.card{
background:rgba(255,255,255,0.1);
padding:20px;
border-radius:20px;
box-shadow:0 10px 25px rgba(0,0,0,0.3);
}

.value{font-size:28px;}

button{
padding:12px 20px;
margin:10px;
border:none;
border-radius:12px;
background:#4f8cff;
color:white;
font-size:16px;
}

canvas{
background:white;
border-radius:15px;
margin:15px;
}

#map{
height:250px;
margin:20px;
border-radius:15px;
}

#popup{
position:fixed;
top:20px;
left:50%;
transform:translateX(-50%);
background:#ff4d4d;
padding:15px 25px;
border-radius:12px;
display:none;
font-weight:bold;
}
</style>
</head>

<body>

<div id="popup">⚠️ HARD BRAKE DETECTED</div>

<h1>🏍 MotoSafe Pro</h1>

<div class="container">

<div class="card">
<h3>Speed</h3>
<div id="speed" class="value">0</div>
</div>

<div class="card">
<h3>Peak Decel</h3>
<div id="peak" class="value">0</div>
</div>

<div class="card">
<h3>Brake Distance</h3>
<div id="brakeDist" class="value">0</div>
</div>

<div class="card">
<h3>AI Risk</h3>
<div id="risk" class="value">100</div>
</div>

</div>

<button onclick="startRide()">Start</button>
<button onclick="stopRide()">Stop</button><br>

<button onclick="exportCSV()">Export CSV</button>
<button onclick="clearData()">Clear</button>

<h2>Speed Graph</h2>
<canvas id="speedChart"></canvas>

<h2>Deceleration Graph</h2>
<canvas id="decelChart"></canvas>

<h2>Map</h2>
<div id="map"></div>

<h2>Summary</h2>
<div class="card">
<p>Total Brakes: <span id="total">0</span></p>
<p>Hard Brakes: <span id="hard">0</span></p>
<p>Avg Decel: <span id="avg">0</span></p>
<p>Max Decel: <span id="max">0</span></p>
</div>

<script src="script.js"></script>

</body>
</html>
