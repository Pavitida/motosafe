<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>MotoSafe</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="style.css">

  <!-- Chart -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <!-- Leaflet Map -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
</head>

<body>

<h1>MotoSafe</h1>

<div class="card hero-container">
  <div id="speed">0</div>
  <div class="unit">km/h</div>

  <p>Risk: <span id="risk">0</span></p>
  <p>Style: <span id="style">SAFE</span></p>
</div>

<div class="card">
  <div id="map"></div>
</div>

<div class="card">
  <canvas id="chart"></canvas>
</div>

<div class="button-group">
  <button class="start" onclick="startRide()">Start</button>
  <button class="stop" onclick="stopRide()">Stop</button>
  <button class="export" onclick="exportData()">Export</button>
</div>

<script src="script.js"></script>

</body>
</html>
