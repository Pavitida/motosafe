<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MotoSafe AI</title>

  <link rel="stylesheet" href="style.css" />

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
  <script src="https://unpkg.com/leaflet.heat/dist/leaflet-heat.js"></script>
</head>
<body>

  <header>
    <h1>🏍 MOTOSAFE</h1>
    <div class="recording-wrap">
      <span class="record-dot"></span>
      <span id="recordText">IDLE</span>
    </div>
  </header>

  <div id="popup"></div>

  <!-- CONTROL CARD -->
  <section class="card">
    <div class="button-group">
      <button class="start" onclick="startRide()">Start</button>
      <button class="stop" onclick="stopRide()">Stop</button>
      <button class="export" onclick="exportCSV()">Export CSV</button>
      <button class="clear" onclick="clearData()">Clear</button>
    </div>
  </section>

  <!-- HERO CARD -->
  <section class="card">
    <div class="hero-container">
      <div class="speed-unit">CURRENT SPEED</div>
      <span id="speed">0.0</span>
      <div class="speed-unit">km/h</div>
    </div>

    <div class="summary-row" style="text-align:center; margin-top: 8px;">
      Session: <span id="sessionId">-</span> |
      Duration: <span id="duration">0</span>s |
      Distance: <span id="distanceRide">0.00</span> km
    </div>

    <hr style="border:0;border-top:1px solid rgba(255,255,255,0.10);margin:16px 0;">

    <div class="stats-grid">
      <div class="stat-item">
        <div class="risk-label">PEAK DECEL</div>
        <div id="peak" class="stat-value">0</div>
      </div>

      <div class="stat-item">
        <div class="risk-label">RISK LEVEL</div>
        <div id="risk" class="stat-value">100</div>
      </div>
    </div>

    <div class="style-wrap">
      <span class="speed-unit">STYLE:</span>
      <strong id="style">SAFE</strong>
    </div>
  </section>

  <!-- SUMMARY CARD -->
  <section class="card">
    <div class="stats-grid">
      <div class="stat-item">
        <div class="risk-label">TOTAL BRAKES</div>
        <div id="total" class="stat-value">0</div>
      </div>

      <div class="stat-item">
        <div class="risk-label">HARD BRAKES</div>
        <div id="hard" class="stat-value">0</div>
      </div>

      <div class="stat-item">
        <div class="risk-label">BRAKE DISTANCE</div>
        <div><span id="brakeDist" class="stat-value">0</span> km</div>
      </div>

      <div class="stat-item">
        <div class="risk-label">AVG DECEL</div>
        <div id="avg" class="stat-value">0</div>
      </div>
    </div>

    <div class="summary-row" style="text-align:center;">
      Max Decel: <span id="max">0</span>
    </div>
  </section>

  <!-- MAP CARD -->
  <section class="card">
    <div class="risk-label" style="margin-bottom:10px;">LIVE MAP</div>
    <div id="map"></div>
  </section>

  <!-- CHARTS CARD -->
  <section class="card">
    <div class="risk-label" style="margin-bottom:10px;">SPEED TREND</div>
    <canvas id="speedChart"></canvas>
  </section>

  <section class="card">
    <div class="risk-label" style="margin-bottom:10px;">DECELERATION TREND</div>
    <canvas id="decelChart"></canvas>
  </section>

  <!-- OPTIONAL SESSION TOOLS (hidden by CSS if needed) -->
  <section class="card session-tools">
    <div class="tool-block">
      <label>Phone Position</label>
      <select onchange="setPhonePosition(this.value)">
        <option value="handlebar" selected>Handlebar</option>
        <option value="pocket">Pocket</option>
        <option value="bag">Bag</option>
      </select>
      <div class="summary-row">Current: <span id="phonePosText">handlebar</span></div>
    </div>

    <div class="tool-block">
      <label>Manual Mark</label>
      <div class="mark-buttons">
        <button class="mark-btn" onclick="markEvent('POTHOLE')">Mark Pothole</button>
        <button class="mark-btn" onclick="markEvent('BRAKE')">Mark Brake</button>
      </div>
    </div>
  </section>

  <script src="script.js"></script>
</body>
</html>
