<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>MotoSafe</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.heat/dist/leaflet-heat.js"></script>

<style>
body{
font-family:sans-serif;
margin:0;
padding:20px;
background:#f5f6fa;
}

.card{
background:white;
padding:15px;
margin-bottom:15px;
border-radius:12px;
box-shadow:0 4px 10px rgba(0,0,0,0.05);
}

button{
padding:10px 15px;
border:none;
border-radius:8px;
margin:5px;
font-size:14px;
}

.start{background:#51cf66;color:white;}
.stop{background:#ff6b6b;color:white;}
.export{background:#339af0;color:white;}
.clear{background:#868e96;color:white;}

#map{height:300px;border-radius:10px;}

#popup{
position:fixed;
top:20px;
left:50%;
transform:translateX(-50%);
padding:12px 20px;
border-radius:12px;
color:white;
font-weight:bold;
display:none;
z-index:9999;
}
</style>
</head>

<body>

<h1>🏍 MotoSafe</h1>

<div class="card">
<button class="start" onclick="startRide()">Start</button>
<button class="stop" onclick="stopRide()">Stop</button>
<button class="export" onclick="exportCSV()">Export CSV</button>
<button class="clear" onclick="clearData()">Clear</button>
</div>

<div class="card">
<p>Speed: <span id="speed">0</span> km/h</p>
<p>Peak Decel: <span id="peak">0</span></p>
</div>

<div class="card">
<canvas id="speedChart"></canvas>
</div>

<div class="card">
<canvas id="decelChart"></canvas>
</div>

<div class="card">
<div id="map"></div>
</div>

<!-- 🔥 ANALYSIS -->
<div class="card">
<h2>🚀 Driving Analysis</h2>

<p>Total Brakes: <span id="total">0</span></p>
<p>Hard Brakes: <span id="hard">0</span></p>
<p>Brake Distance: <span id="brakeDist">0</span> m</p>

<p>AI Risk Score: <span id="risk">100</span></p>

<p>Avg Decel: <span id="avg">0</span></p>
<p>Max Decel: <span id="max">0</span></p>

<p style="color:#51cf66">🟢 Slow</p>
<p style="color:#ffd43b">🟡 Normal</p>
<p style="color:#ff6b6b">🔴 Hard</p>
</div>

<!-- 🔴 POPUP -->
<div id="popup">ALERT</div>

<script src="script.js"></script>

</body>
</html>
