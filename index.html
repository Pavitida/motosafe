<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>MotoSafe</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="style.css">

<!-- Leaflet -->
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<!-- Heatmap -->
<script src="https://unpkg.com/leaflet.heat/dist/leaflet-heat.js"></script>

<!-- Chart -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

<h1>🏍 MotoSafe</h1>

<div class="container">

<div class="card">
<h2>Speed</h2>
<div id="speed">0</div>
<p id="style">SAFE</p>
</div>

<div class="card">
<h2>Risk</h2>
<div id="risk">100</div>
<p>Peak Decel: <span id="peak">0</span></p>
</div>

<div class="card">
<h2>Braking</h2>
<p>Total: <span id="total">0</span></p>
<p>Hard: <span id="hard">0</span></p>
<p>Distance: <span id="brakeDist">0</span></p>
</div>

<div class="card">
<h2>Summary</h2>
<p>Avg Decel: <span id="avg">0</span></p>
<p>Max Decel: <span id="max">0</span></p>
</div>

</div>

<canvas id="speedChart"></canvas>
<canvas id="decelChart"></canvas>

<div id="map"></div>

<div class="buttons">
<button id="startBtn" onclick="startRide()">Start</button>
<button id="stopBtn" onclick="stopRide()">Stop</button>
<button onclick="exportCSV()">Export</button>
<button onclick="clearData()">Clear</button>
</div>

<div id="popup"></div>

<script src="script.js"></script>

</body>
</html>
