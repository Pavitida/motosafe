<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>MotoSafe Timer</title>
</head>

<body>

<h2>MotoSafe Riding Timer</h2>

<button onclick="startSensor()">Start Sensor</button>

<p>Duration (s): <span id="duration">0</span></p>

<script>

let startTime = null;
let totalTime = 0;
let moving = false;

const threshold = 1.2; 
const stopDelay = 3000; 

let lastMoveTime = 0;

function startSensor(){

if (typeof DeviceMotionEvent.requestPermission === "function") {

DeviceMotionEvent.requestPermission().then(permissionState => {

if (permissionState === "granted") {

window.addEventListener("devicemotion", motionHandler);

}

});

} else {

window.addEventListener("devicemotion", motionHandler);

}

}

function motionHandler(event){

let ax = event.accelerationIncludingGravity.x || 0;
let ay = event.accelerationIncludingGravity.y || 0;
let az = event.accelerationIncludingGravity.z || 0;

let magnitude = Math.sqrt(ax*ax + ay*ay + az*az);

let now = Date.now();

if(magnitude > threshold){

lastMoveTime = now;

if(!moving){

moving = true;

startTime = now;

}

}

if(moving && now - lastMoveTime > stopDelay){

moving = false;

totalTime += now - startTime;

startTime = null;

}

updateTimer();

}

function updateTimer(){

let now = Date.now();

let current = totalTime;

if(moving && startTime){

current += now - startTime;

}

document.getElementById("duration").innerText = Math.floor(current/1000);

setTimeout(updateTimer,500);

}

</script>

</body>
</html>
